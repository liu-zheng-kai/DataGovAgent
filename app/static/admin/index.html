<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataGovAgent Admin Console</title>
    <link rel="stylesheet" href="/static/admin/styles.css?v=20260405-3" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-dot"></div>
          <div>
            <h1>DataGovAgent Console</h1>
            <p>MVP Admin</p>
          </div>
        </div>
        <div class="locale-switcher">
          <label for="locale-select">Language</label>
          <select id="locale-select">
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="ja">日本語</option>
          </select>
        </div>
        <nav id="menu"></nav>
      </aside>
      <main class="content">
        <header id="page-header" class="page-header"></header>
        <section id="page-content" class="page-content"></section>
      </main>
    </div>

    <div id="drawer" class="drawer hidden">
      <div class="drawer-inner">
        <div class="drawer-top">
          <h3 id="drawer-title"></h3>
          <button id="drawer-close" class="btn secondary">Close</button>
        </div>
        <div id="drawer-body" class="drawer-body"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="/static/admin/i18n.js?v=20260405-3"></script>
    <script src="/static/admin/app.js?v=20260405-3"></script>
  </body>
</html>
